<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>json in java script</title>
</head>
<body>
    <h2>convert a java script object into a json string, and send it to the server</h2>
    <p id="result"></p>
    <script>
        var myobject={name:"riya", age:12, grade:7}
   var myJSON=JSON.stringify(myobject);// convert object to json for sending data
var newobj=JSON.parse(myJSON);// CONVERT JSON INto object while recieving data
document.getElementById("result").innerHTML=newobj.name;
    </script>
</body>
</html>
