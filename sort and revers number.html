<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>java script array sort</title>
</head>
<body>
    <h2>java array sort</h2>
    <p>click the button to sort the array in ascending order </p>
    <button onclick="ascending()">ascending order</button>
<button onclick="descending()">descending order</button>

<p id="result"></p>
    <script>
  var points=[1,2,4,5,6,7,9,8,0];
  document.getElementById("result").innerHTML = points;

function ascending(){
points.sort(function(a,b) {
return a-b;

});
  document.getElementById ("result").innerHTML = points;
}
function descending(){
    points.sort(function (a, b){
        return b- a;
        });
        document.getElementById("result").innerHTML=points
    }
    </script>
    
</body>
</html>
